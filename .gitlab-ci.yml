stages:
  - build
  - test
  - deploy

variables:
  CARGO_HOME: "${CI_PROJECT_DIR}/.cargo"

default:
  image: rust:1
  cache:
    key: cargo-${CI_COMMIT_REF_SLUG}
    paths:
      - .cargo/
      - target/

build:
  stage: build
  before_script:
    - apt-get update && apt-get install --yes --no-install-recommends protobuf-compiler && rm -rf /var/lib/apt/lists/*
  script:
    - rustc --version
    - cargo --version
    - cargo build --release --locked --verbose

test:
  stage: test
  before_script:
    - apt-get update && apt-get install --yes --no-install-recommends protobuf-compiler && rm -rf /var/lib/apt/lists/*
  script:
    - rustc --version
    - cargo --version
    - cargo test --locked --verbose

deploy:
  stage: deploy
  tags:
    - docker-build
  image:
    name: quay.io/buildah/stable:latest
    entrypoint: [""]
  variables:
    BUILDAH_ISOLATION: chroot
    BUILDAH_FORMAT: docker
  script:
    - export IMAGE_TAG="${CI_COMMIT_TAG:-${CI_COMMIT_SHORT_SHA}}"
    - buildah login -u "${CI_REGISTRY_USER}" -p "${CI_REGISTRY_PASSWORD}" "${CI_REGISTRY}"
    - buildah build --file Dockerfile --tag "${CI_REGISTRY_IMAGE}:${IMAGE_TAG}" .
    - buildah push "${CI_REGISTRY_IMAGE}:${IMAGE_TAG}"
    - |
      if [ -n "${CI_COMMIT_TAG}" ]; then
        buildah tag "${CI_REGISTRY_IMAGE}:${IMAGE_TAG}" "${CI_REGISTRY_IMAGE}:latest"
        buildah push "${CI_REGISTRY_IMAGE}:latest"
      fi
  rules:
    - if: $CI_COMMIT_TAG
